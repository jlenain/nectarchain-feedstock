{% set name = "nectarchain" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nectarchain-{{ version }}.tar.gz
  sha256: b43c823b598d42b669db00b5a97b61e4caeaa0c45c4f9dc1ac05e76dbf106425

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=65, <81
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - ctapipe =0.24
    - ctapipe-io-nectarcam =0.2
    - h5py
    - lmfit
    - numpy <2.4
    - pandas
    - pyqt
    - pyqtgraph
    - scipy
    - zeo
    - zodb

test:
  imports:
    - nectarchain
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/cta-observatory/nectarchain
  summary: Analysis chain for the CTA MSTN NectarCAM prototype
  license: BSD-3-Clause
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - jlenain
